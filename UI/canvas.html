<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Win98 Window</title>

    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/window.css">
    <link rel="stylesheet" href="css/grid.css">
    <link rel="stylesheet" href="css/window_content.css">

</head>
<body>

<div id="grid_wrap">
    <div class="window">
        <div class="window_header">
            <span class="window_name">USERNAME</span>
            <div class="window_controls">
                <div class="window_top_btn">_</div>
                <div class="window_top_btn">☐</div>
                <div class="window_top_btn">X</div>
            </div>
        </div>
        <div class="window_content canvas_buttons">

            <div class="canvas_buttons_user_wrap">
                <img src="images/user.jpg" alt="" class="canvas_buttons_userProfile">
                <span class="canvas_buttons_username">USER</span>
            </div>

            <div class="canvas_area_btn_wrap">
                <button class="window_btn">New Canvas</button>
                <button class="window_btn">Random Connect</button>
                <button class="window_btn">Custom Connect</button>
            </div>
        </div>
        <div class="window_footer">
            <!--<button class="window_btn">OK</button>-->
        </div>
    </div>

    <div class="window">
        <div class="window_header">
            <span class="window_name">canvas_area</span>
            <div class="window_controls">
                <div class="window_top_btn">_</div>
                <div class="window_top_btn">☐</div>
                <div class="window_top_btn">X</div>
            </div>
        </div>
        <div class="window_content canvas_area">
            <span class="window_content_text">Connection Established.</span>
        </div>
        <div class="window_footer">
            <button class="window_btn">OK</button>
        </div>
    </div>

    <div class="window">
        <div class="window_header">
            <span class="window_name">music_player</span>
            <div class="window_controls">
                <div class="window_top_btn">_</div>
                <div class="window_top_btn">☐</div>
                <div class="window_top_btn">X</div>
            </div>
        </div>
        <div class="window_content music_player">
            <div class="music_player_top">
                <img src="images/music_1.jpg" alt="" class="music_player_img">
                <span class="music_player_song_name">song</span>
                <div class="music_player_controls">
                    <button class="window_btn"> 1 </button>
                    <button class="window_btn"> 2 </button>
                    <button class="window_btn"> 3 </button>
                    <button class="window_btn"> 4 </button>
                </div>
            </div>
        </div>
        <div class="window_footer">
            <div class="music_player_bottom"></div>
        </div>
    </div>

    <div class="window">
        <div class="window_header">
            <span class="window_name">drawing_tools</span>
            <div class="window_controls">
                <div class="window_top_btn">_</div>
                <div class="window_top_btn">☐</div>
                <div class="window_top_btn">X</div>
            </div>
        </div>
        <div class="window_content drawing_tools">
            <span class="window_content_text">Connection Established.</span>
        </div>
        <div class="window_footer">
            <button class="window_btn">OK</button>
        </div>
    </div>
</div>

</body>
</html>
