<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        * {
            padding: 0;
            margin: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background-color: var(--win98-blue);
        }

        .screen {
            position: relative;
            width: 800px;
            height: 400px;
            background-image: radial-gradient(transparent 60%, black);
        }

        .bezel, .content, .scan {
            position: absolute;
            height: 100%;
            width: 100%;
            top: 0;
        }

        .content , .scan-bar{
            z-index: -1;
        }

        .bezel {
            box-shadow: 2px 2px 8px rgb(24, 24, 24);
        }

        .scan-bar {
            height: 100%;
            animation: scan 1.5s infinite;
        }

        .scan {
            height: 20px;
            width: 100%;

            background-color: rgba(196, 196, 196, 0.445);

        }

        @keyframes scan {
            0% {
                transform: translateY(0%);
                opacity: 5;
            }
            100% {
                transform: translateY(100%);
                opacity: 0;
            }
        }

        /* -- */
        .content {
            background-image: url("./images/background.gif");
            background-repeat: no-repeat;
            background-size: 100%;
        }
    </style>
</head>
<body>

<div class="screen">
    <img src="./images/bezel.png" alt="" class="bezel">
    <div class="content"></div>
    <div class="scan-bar">
        <div class="scan"></div>
    </div>
</div>

</body>
</html>
